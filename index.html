<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>OnTime · out the door, gracefully</title>
  <meta name="description" content="A gentle getting-ready timer that works backwards from when you need to leave." />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#fdf3f7" />
  <link rel="icon" href="./icons/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="./icons/icon-192.png" type="image/png" />

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="OnTime" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <i class="blob b1"></i><i class="blob b2"></i><i class="blob b3"></i>
  </div>

  <main id="app" class="app" aria-live="polite"></main>

  <noscript>
    <div style="padding:2rem;text-align:center;font-family:sans-serif">
      OnTime needs JavaScript to keep you on time 🌷
    </div>
  </noscript>

  <script src="./app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    }
  </script>
</body>
</html>
